apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rulyeh-data
  namespace: claudulhu
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rulyeh
  namespace: claudulhu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rulyeh
  template:
    metadata:
      labels:
        app: rulyeh
    spec:
      serviceAccountName: rulyeh
      containers:
        - name: rulyeh
          image: ghcr.io/georgebradford0/rulyeh:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 9000
              name: noise
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claudulhu-secrets
                  key: anthropic-api-key
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claudulhu-secrets
                  key: gh-token
                  optional: true
            - name: PUBLIC_PORT
              value: "30090"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rulyeh-data
---
# Internal HTTP access for children messaging rulyeh
apiVersion: v1
kind: Service
metadata:
  name: rulyeh
  namespace: claudulhu
spec:
  selector:
    app: rulyeh
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
# External Noise tunnel access
apiVersion: v1
kind: Service
metadata:
  name: rulyeh-noise
  namespace: claudulhu
spec:
  type: NodePort
  selector:
    app: rulyeh
  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 30090
      name: noise
