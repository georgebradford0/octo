# Non-secret template — shows expected keys without real values.
# Create the real secret with:
#   kubectl create secret generic octo-secrets \
#     --from-literal=anthropic-api-key="<key>" \
#     --from-literal=gh-token="<token>" \
#     -n octo
apiVersion: v1
kind: Secret
metadata:
  name: octo-secrets
  namespace: octo
type: Opaque
stringData:
  anthropic-api-key: "<ANTHROPIC_API_KEY>"
  gh-token: "<GH_TOKEN>"
