name: lair Release

on:
  workflow_dispatch:

# Builds `octo-lair` for both Linux arches and uploads it as the release asset
# pair attached to a fresh tag `lair-v<version>` (version read from
# `lair/Cargo.toml`). This release is *not* marked as the repo-wide "Latest" —
# octo's CLI release uses its own `cli-v<version>` tag, and `scripts/get-cli.sh`
# queries the GitHub API for the most recent `lair-v*` tag independently.

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: octo-lair-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: octo-lair-linux-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^version' lair/Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compilation toolchain (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build octo-lair
        run: cargo build --release -p octo-lair --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/octo-lair ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^version' lair/Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Create GitHub release
        run: |
          gh release create "lair-v${{ steps.version.outputs.value }}" \
            --title "octo-lair v${{ steps.version.outputs.value }}" \
            --latest=false \
            --notes "octo-lair binary — the server runtime, dispatched into both \`--role lair\` (parent / orchestrator) and \`--role agent\` (child) by the merged binary.

          Linux x86_64 and aarch64.

          Pulled by \`scripts/get-cli.sh\` and \`octo update\` automatically." \
            artifacts/octo-lair-linux-x86_64/octo-lair-linux-x86_64 \
            artifacts/octo-lair-linux-aarch64/octo-lair-linux-aarch64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
