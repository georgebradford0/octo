services:
  # Single lair container. Manages child agent containers via the host's
  # Docker socket; child containers appear inside the mobile app once mobile
  # has scanned lair's QR. `octo init` is the recommended entry point — this
  # compose file is for operators who prefer to manage lair via compose.
  lair:
    container_name: lair
    image: ghcr.io/georgebradford0/lair:latest
    build:
      context: .
      dockerfile: lair/Dockerfile
    labels:
      octo.managed: "1"
      octo.role:    "lair"
    ports:
      - "${LAIR_NOISE_PORT:-8443}:9000"
      - "127.0.0.1:${LAIR_HTTP_PORT:-8000}:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY_OCTO}
      - GH_TOKEN=${GH_TOKEN:-}
      - MODEL=${MODEL:-}
      - OPENAI_API_URL=${OPENAI_API_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - PUBLIC_HOST=${PUBLIC_HOST:-}
      - PUBLIC_PORT=${LAIR_NOISE_PORT:-8443}
      - NOISE_PORT=9000
      - OCTO_DATA_DIR=/data
      - NOISE_KEY_FILE=/data/noise_key.bin
      - OCTO_SKIP_SHELL_ENV=1
      - OCTO_DEV=${OCTO_DEV:-0}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${LAIR_DATA_DIR:-./lair-data}:/data
    restart: unless-stopped
